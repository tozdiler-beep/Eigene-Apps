<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Supplement Tracker</title>

    <link rel="manifest" href="manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">

    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --accent-gradient: linear-gradient(135deg, #0d9488, #115e59);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 90px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 10px; }
        .header h1 { font-size: 28px; font-weight: 700; }
        
        .progress-card {
            background: var(--accent-gradient);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .progress-card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.9; }
        .progress-card .count { font-size: 48px; font-weight: 800; margin: 8px 0; }
        .progress-card .status { font-size: 15px; opacity: 0.9; }

        .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; margin-top: 24px; }
        
        .empty-state {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        .list-container { display: flex; flex-direction: column; gap: 12px; }
        .item-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .item-info p { font-size: 13px; color: var(--text-muted); }
        .item-info .badge { display: inline-block; padding: 2px 8px; background-color: #27272a; border-radius: 8px; font-size: 11px; margin-top: 4px; }

        .btn-check {
            background-color: #27272a; border: none; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-weight: bold;
        }
        .btn-check.done { background-color: #0d9488; }
        .btn-delete { background-color: #f43f5e; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
            background-color: rgba(24, 24, 27, 0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item {
            background: none; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; width: 50%;
        }
        .nav-item.active { color: #0d9488; }
        .nav-item svg { width: 22px; height: 22px; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: flex-end; z-index: 2000;
        }
        .modal.open { display: flex; }
        .modal-content {
            background-color: var(--card-bg); border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 20px; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 26px; cursor: pointer; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-control {
            width: 100%; background-color: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px; color: var(--text-main); font-size: 15px;
        }
        .btn-submit {
            width: 100%; background: var(--accent-gradient); color: var(--text-main); border: none;
            border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }
        
        .view-tab { display: none; }
        .view-tab.active { display: block; }
    </style>
</head>
<body>

    <div id="tab-today" class="view-tab active">
        <div class="header">
            <h1>Supplements</h1>
        </div>

        <div class="progress-card">
            <h3>Fortschritt Heute</h3>
            <div class="count" id="progress-text">0 / 0</div>
            <div class="status" id="motivation-text">Lade Routine...</div>
        </div>

        <div class="section-title">Heute fällig</div>
        <div id="todo-list" class="list-container"></div>
    </div>

    <div id="tab-manage" class="view-tab">
        <div class="header">
            <h1>Verwaltung</h1>
        </div>
        <div class="section-title">Alle aktiven Intervalle</div>
        <div id="master-list" class="list-container"></div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" id="btn-tab-today" onclick="switchTab('today')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Heute fällig
        </button>
        <button class="nav-item" id="btn-tab-manage" onclick="switchTab('manage')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Meine Liste
        </button>
        <button class="nav-item" onclick="openModal()" style="color: #0d9488; font-weight: bold;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Neu
        </button>
    </div>

    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Neues Intervall anlegen</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Name des Supplements</label>
                <input type="text" id="sup-name" class="form-control" placeholder="z.B. Magnesium">
            </div>
            <div class="form-group">
                <label>Dosierung / Menge</label>
                <input type="text" id="sup-dosage" class="form-control" placeholder="z.B. 400mg">
            </div>
            <div class="form-group">
                <label>Häufigkeit (Intervall)</label>
                <select id="sup-interval" class="form-control">
                    <option value="1">Täglich</option>
                    <option value="2">Alle 2 Tage</option>
                    <option value="7">Einmal pro Woche</option>
                    <option value="30">Einmal pro Monat</option>
                </select>
            </div>
            <button class="btn-submit" onclick="addSupplement()">In Routine speichern</button>
        </div>
    </div>

    <script>
        let data = { supplements: [], history: {} };

        const getTodayKey = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // SERVICE WORKER REGISTRIERUNG (Zwingend für Chrome Vollbild)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Fehler", err));
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const localData = localStorage.getItem('supplement_tracker_data');
                if (localData) data = JSON.parse(localData);
                if (!data.supplements) data.supplements = [];
                if (!data.history) data.history = {};
                render();
            } catch (e) {
                console.error("Datenfehler:", e);
                render();
            }
        });

        function saveData() {
            localStorage.setItem('supplement_tracker_data', JSON.stringify(data));
            render();
        }

        function openModal() { document.getElementById('add-modal').classList.add('open'); }
        function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

        function addSupplement() {
            const name = document.getElementById('sup-name').value.trim();
            const dosage = document.getElementById('sup-dosage').value.trim();
            const interval = parseInt(document.getElementById('sup-interval').value);
            
            if (!name) return;

            data.supplements.push({
                id: Date.now().toString(),
                name: name,
                dosage: dosage || '1x',
                interval: interval,
                createdTimestamp: Date.now()
            });

            document.getElementById('sup-name').value = '';
            document.getElementById('sup-dosage').value = '';
            closeModal();
            saveData();
        }

        function toggleCheck(id) {
            const today = getTodayKey();
            if (!data.history[today]) data.history[today] = [];
            const index = data.history[today].indexOf(id);
            if (index > -1) {
                data.history[today].splice(index, 1);
            } else {
                data.history[today].push(id);
            }
            saveData();
        }

        function deleteSupplement(id) {
            if(confirm("Dieses Supplement unwiderruflich aus der Liste löschen?")) {
                data.supplements = data.supplements.filter(item => item.id !== id);
                saveData();
            }
        }

        function isDueToday(item) {
            if (item.interval === 1) return true;
            
            const createdDate = new Date(item.createdTimestamp);
            createdDate.setHours(0,0,0,0);
            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);
            
            const diffTime = Math.abs(todayDate - createdDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return (diffDays % item.interval) === 0;
        }

        function render() {
            const todoList = document.getElementById('todo-list');
            const masterList = document.getElementById('master-list');
            const today = getTodayKey();
            const takenToday = data.history[today] || [];

            const dueItems = data.supplements.filter(isDueToday);

            if (dueItems.length === 0) {
                todoList.innerHTML = `<div class="empty-state">Hervorragend! Für heute stehen keine Intervalle an oder die Liste ist leer.</div>`;
            } else {
                let todoHTML = '';
                dueItems.forEach(item => {
                    const isDone = takenToday.includes(item.id);
                    todoHTML += `
                        <div class="item-card">
                            <div class="item-info">
                                <h4>${item.name}</h4>
                                <p>${item.dosage}</p>
                            </div>
                            <button class="btn-check ${isDone ? 'done' : ''}" onclick="toggleCheck('${item.id}')">
                                ${isDone ? '✓' : ''}
                            </button>
                        </div>
                    `;
                });
                todoList.innerHTML = todoHTML;
            }

            if (data.supplements.length === 0) {
                masterList.innerHTML = `<div class="empty-state">Noch keine Supplements angelegt.</div>`;
            } else {
                let masterHTML = '';
                data.supplements.forEach(item => {
                    let intText = item.interval === 1 ? 'Täglich' : `Alle ${item.interval} Tage`;
                    if(item.interval === 7) intText = 'Wöchentlich';
                    masterHTML += `
                        <div class="item-card">
                            <div class="item-info">
                                <h4>${item.name}</h4>
                                <p>${item.dosage} <span class="badge">${intText}</span></p>
                            </div>
                            <button class="btn-delete" onclick="deleteSupplement('${item.id}')">Löschen</button>
                        </div>
                    `;
                });
                masterList.innerHTML = masterHTML;
            }

            const total = dueItems.length;
            const count = dueItems.filter(item => takenToday.includes(item.id)).length;
            document.getElementById('progress-text').innerText = `${count} / ${total}`;
            
            if(total > 0 && count === total) {
                document.getElementById('motivation-text').innerText = "Perfekt! Alle Intervalle für heute erledigt. 🌟";
            } else if (count > 0) {
                document.getElementById('motivation-text').innerText = "Gute Arbeit, die Hälfte ist geschafft!";
            } else {
                document.getElementById('motivation-text').innerText = "Deine heutigen Intervalle warten auf dich.";
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            if(tab === 'today') {
                document.getElementById('tab-today').classList.add('active');
                document.getElementById('btn-tab-today').classList.add('active');
            } else {
                document.getElementById('tab-manage').classList.add('active');
                document.getElementById('btn-tab-manage').classList.add('active');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Supplement Tracker</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Supplements%22,%22short_name%22:%22Supplements%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%2309090b%22,%22theme_color%22:%22%2309090b%22}">

    <style>
        /* Modernes, dunkles UI-Design */
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --accent-gradient: linear-gradient(135deg, #0d9488, #115e59);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 10px; }
        .header h1 { font-size: 28px; font-weight: 700; }
        
        .progress-card {
            background: var(--accent-gradient);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .progress-card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.9; }
        .progress-card .count { font-size: 48px; font-weight: 800; margin: 8px 0; }
        .progress-card .status { font-size: 16px; opacity: 0.9; }

        .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; margin-top: 24px; }
        
        .empty-state {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        .list-container { display: flex; flex-direction: column; gap: 12px; }
        .item-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .item-info p { font-size: 13px; color: var(--text-muted); }

        .btn-check {
            background-color: #27272a;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
        }
        .btn-check.done { background-color: #0d9488; }

        /* Navigation unten */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 64px;
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item {
            background: none; border: none;
            color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; font-size: 11px; cursor: pointer;
            width: 33%;
        }
        .nav-item.active { color: #0d9488; }
        .nav-item svg { width: 20px; height: 20px; }

        /* Modal für Hinzufügen */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 2000;
        }
        .modal.open { display: flex; }
        .modal-content {
            background-color: var(--card-bg);
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 24px; width: 100%; max-width: 500px;
            box-shadow: 0 -10px 25px -5px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 20px; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 24px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-control {
            width: 100%; background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px;
            color: var(--text-main); font-size: 15px;
        }
        .btn-submit {
            width: 100%; background: var(--accent-gradient);
            color: var(--text-main); border: none;
            border-radius: 12px; padding: 14px;
            font-size: 16px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Supplements</h1>
    </div>

    <div class="progress-card">
        <h3>Dein Fortschritt Heute</h3>
        <div class="count" id="progress-text">0 / 0</div>
        <div class="status" id="motivation-text">Trage deine Supplements ein...</div>
    </div>

    <div class="section-title">Heute fällig</div>
    <div id="todo-list" class="list-container">
        </div>

    <div class="section-title">Meine Liste</div>
    <div id="master-list" class="list-container">
        </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="switchTab('today')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Aktivität
        </button>
        <button class="nav-item" onclick="openModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Neu
        </button>
    </div>

    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Neues Supplement</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="sup-name" class="form-control" placeholder="z.B. Magnesium">
            </div>
            <div class="form-group">
                <label>Dosierung / Uhrzeit</label>
                <input type="text" id="sup-dosage" class="form-control" placeholder="z.B. 400mg - Abends">
            </div>
            <button class="btn-submit" onclick="addSupplement()">Hinzufügen</button>
        </div>
    </div>

    <script>
        // Daten-Management (LocalStorage)
        let data = {
            supplements: [],
            history: {}
        };

        // Genaue Datumskennung für heute (YYYY-MM-DD)
        const getTodayKey = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // Laden beim Start
        window.addEventListener('DOMContentLoaded', () => {
            try {
                const localData = localStorage.getItem('supplement_tracker_data');
                if (localData) {
                    data = JSON.parse(localData);
                }
                // Fallback-Struktur falls Daten unvollständig
                if (!data.supplements) data.supplements = [];
                if (!data.history) data.history = {};
                
                render();
            } catch (e) {
                console.error("Fehler beim Laden der Daten:", e);
                alert("Daten konnten nicht geladen werden. Setze zurück.");
                render();
            }
        });

        function saveData() {
            localStorage.setItem('supplement_tracker_data', JSON.stringify(data));
            render();
        }

        function openModal() { document.getElementById('add-modal').classList.add('open'); }
        function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

        function addSupplement() {
            const name = document.getElementById('sup-name').value.trim();
            const dosage = document.getElementById('sup-dosage').value.trim();
            
            if (!name) return;

            data.supplements.push({
                id: Date.now().toString(),
                name: name,
                dosage: dosage || '1x täglich'
            });

            document.getElementById('sup-name').value = '';
            document.getElementById('sup-dosage').value = '';
            closeModal();
            saveData();
        }

        function toggleCheck(id) {
            const today = getTodayKey();
            if (!data.history[today]) data.history[today] = [];

            const index = data.history[today].indexOf(id);
            if (index > -1) {
                data.history[today].splice(index, 1); // Wieder unchecken
            } else {
                data.history[today].push(id); // Als eingenommen markieren
            }
            saveData();
        }

        function deleteSupplement(id) {
            if(confirm("Möchtest du dieses Supplement wirklich löschen?")) {
                data.supplements = data.supplements.filter(item => item.id !== id);
                saveData();
            }
        }

        function render() {
            const todoList = document.getElementById('todo-list');
            const masterList = document.getElementById('master-list');
            const today = getTodayKey();
            const takenToday = data.history[today] || [];

            // 1. "Heute Fällig" Liste rendern
            if (data.supplements.length === 0) {
                todoList.innerHTML = `<div class="empty-state">Keine Supplements eingetragen. Tippe unten auf "Neu".</div>`;
                masterList.innerHTML = `<div class="empty-state">Die Liste ist leer.</div>`;
                document.getElementById('progress-text').innerText = "0 / 0";
                document.getElementById('motivation-text').innerText = "Erstelle zuerst ein Supplement!";
                return;
            }

            let todoHTML = '';
            data.supplements.forEach(item => {
                const isDone = takenToday.includes(item.id);
                todoHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.dosage}</p>
                        </div>
                        <button class="btn-check ${isDone ? 'done' : ''}" onclick="toggleCheck('${item.id}')">
                            ${isDone ? '✓' : ''}
                        </button>
                    </div>
                `;
            });
            todoList.innerHTML = todoHTML;

            // 2. "Verwaltung / Meine Liste" rendern
            let masterHTML = '';
            data.supplements.forEach(item => {
                masterHTML += `
                    <div class="item-card" style="opacity: 0.8;">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.dosage}</p>
                        </div>
                        <button class="btn-check" style="background-color: #7f1d1d; font-size: 12px;" onclick="deleteSupplement('${item.id}')">✕</button>
                    </div>
                `;
            });
            masterList.innerHTML = masterHTML;

            // 3. Fortschrittskarte aktualisieren
            const total = data.supplements.length;
            const count = takenToday.filter(id => data.supplements.some(s => s.id === id)).length;
            document.getElementById('progress-text').innerText = `${count} / ${total}`;
            
            if(total > 0 && count === total) {
                document.getElementById('motivation-text').innerText = "Hervorragend! Alles für heute erledigt. 🎉";
            } else if (count > 0) {
                document.getElementById('motivation-text').innerText = "Weiter so! Du bist auf einem guten Weg.";
            } else {
                document.getElementById('motivation-text').innerText = "Bereit für den Tag? Starte jetzt deine Routine.";
            }
        }

        function switchTab(tab) {
            // Für spätere Erweiterungen (z.B. Verlaufs-Statistiken)
        }
    </script>
</body>
</html>
